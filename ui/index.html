<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evo Edge TTS</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #09111f;
            --panel: rgba(12, 27, 48, 0.92);
            --line: #26436a;
            --text: #edf5ff;
            --muted: #97abc8;
            --accent: #44d1ff;
            --accent-2: #1379ff;
            --ok: #7ef0af;
            --bad: #ff9db2;
            --warn: #ffd479;
        }
        body {
            margin: 0;
            font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(68, 209, 255, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(19, 121, 255, 0.15), transparent 24%),
                linear-gradient(180deg, #050a14 0%, var(--bg) 100%);
            min-height: 100vh;
        }
        .wrap {
            width: min(90vw, 1600px);
            margin: 0 auto;
            padding: 28px 18px 40px;
        }
        .hero, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 22px;
            backdrop-filter: blur(10px);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.28);
        }
        .hero {
            padding: 28px;
            margin-bottom: 18px;
        }
        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.2rem);
            line-height: 0.95;
            letter-spacing: -0.03em;
        }
        .grid {
            display: grid;
            grid-template-columns: 1.5fr 0.8fr;
            gap: 18px;
        }
        .panel {
            padding: 22px;
        }
        .panel h2 {
            margin: 0 0 14px;
            font-size: 1.08rem;
            color: var(--accent);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .stack {
            display: grid;
            gap: 12px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 0.93rem;
        }
        textarea, select {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(5, 14, 27, 0.92);
            color: var(--text);
            border-radius: 14px;
            padding: 12px 13px;
            font: inherit;
        }
        textarea {
            min-height: 280px;
            resize: vertical;
            line-height: 1.55;
        }
        .cols {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        button, .link-button {
            border: 0;
            border-radius: 14px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            color: white;
            text-decoration: none;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(7, 18, 34, 0.95);
            line-height: 1.5;
        }
        .status.ok { border-color: rgba(126, 240, 175, 0.35); color: var(--ok); }
        .status.bad { border-color: rgba(255, 157, 178, 0.35); color: var(--bad); }
        .status.warn { border-color: rgba(255, 212, 121, 0.35); color: var(--warn); }
        .player {
            margin-top: 16px;
            display: none;
        }
        .player.active { display: block; }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        code {
            font-family: Consolas, monospace;
            color: var(--text);
        }
        @media (max-width: 920px) {
            .grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .wrap { width: calc(100vw - 24px); padding: 12px 12px 24px; }
            .cols { grid-template-columns: 1fr; }
            .actions { flex-direction: column; }
            button, .link-button { width: 100%; text-align: center; }
            textarea { min-height: 220px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="hero">
            <h1>Evo Edge TTS</h1>
        </section>

        <div class="grid">
            <section class="panel">
                <h2>Generate Audio</h2>
                <form id="ttsForm" class="stack">
                    <div>
                        <label for="text">Text</label>
                        <textarea id="text" name="text" placeholder="Type the text you want to convert into audio."></textarea>
                    </div>

                    <div class="cols">
                        <div>
                            <label for="profile">Profile</label>
                            <select id="profile" name="profile"></select>
                        </div>
                        <div>
                            <label for="voice">Voice</label>
                            <select id="voice" name="voice"></select>
                        </div>
                        <div>
                            <label for="speed">Speed</label>
                            <select id="speed" name="speed">
                                <option value="-25%">-25%</option>
                                <option value="-10%">-10%</option>
                                <option value="+0%" selected>Normal</option>
                                <option value="+10%">+10%</option>
                                <option value="+25%">+25%</option>
                            </select>
                        </div>
                        <div>
                            <label for="pitch">Pitch</label>
                            <select id="pitch" name="pitch">
                                <option value="-10Hz">-10Hz</option>
                                <option value="-5Hz">-5Hz</option>
                                <option value="+0Hz" selected>Normal</option>
                                <option value="+5Hz">+5Hz</option>
                                <option value="+10Hz">+10Hz</option>
                                <option value="+12Hz">+12Hz</option>
                            </select>
                        </div>
                        <div>
                            <label for="volume">Volume</label>
                            <select id="volume" name="volume">
                                <option value="-10%">-10%</option>
                                <option value="+0%" selected>Normal</option>
                                <option value="+5%">+5%</option>
                                <option value="+10%">+10%</option>
                            </select>
                        </div>
                        <div>
                            <label for="output_format">Format</label>
                            <select id="output_format" name="output_format">
                                <option value="mp3" selected>MP3</option>
                                <option value="wav">WAV</option>
                            </select>
                        </div>
                    </div>

                    <div class="actions">
                        <button type="submit" id="generateBtn">Generate Audio</button>
                    </div>
                </form>
            </section>

            <aside class="panel">
                <h2>Status</h2>
                <div id="statusBox" class="status warn">Starting system...</div>

                <div class="player" id="playerPanel">
                    <h2>Result</h2>
                    <div id="resultMeta" class="status ok"></div>
                    <audio id="audioPlayer" controls></audio>
                    <div class="actions">
                        <a id="downloadBtn" class="link-button" download="audio.mp3">Download Audio</a>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const apiBase = "http://127.0.0.1:8890";
        const profileSelect = document.getElementById("profile");
        const voiceSelect = document.getElementById("voice");
        const textField = document.getElementById("text");
        const generateBtn = document.getElementById("generateBtn");
        const statusBox = document.getElementById("statusBox");
        const playerPanel = document.getElementById("playerPanel");
        const audioPlayer = document.getElementById("audioPlayer");
        const downloadBtn = document.getElementById("downloadBtn");
        const resultMeta = document.getElementById("resultMeta");
        const form = document.getElementById("ttsForm");

        const fallbackProfiles = [
            { id: "default", label: "Natural", voice: "en-US-AriaNeural", speed: "+0%", pitch: "+0Hz", volume: "+0%" },
            { id: "clear_female", label: "Clear Female", voice: "en-US-AriaNeural", speed: "-5%", pitch: "+0Hz", volume: "+0%" },
            { id: "clear_male", label: "Clear Male", voice: "en-US-GuyNeural", speed: "-3%", pitch: "+0Hz", volume: "+0%" }
        ];

        const fallbackVoices = [
            { name: "en-US-AriaNeural", gender: "Female", locale: "en-US" },
            { name: "en-US-GuyNeural", gender: "Male", locale: "en-US" },
            { name: "pt-BR-FranciscaNeural", gender: "Female", locale: "pt-BR" },
            { name: "pt-BR-AntonioNeural", gender: "Male", locale: "pt-BR" }
        ];

        let currentAudioUrl = null;
        let profiles = fallbackProfiles;

        function fillProfiles(items) {
            profileSelect.innerHTML = "";
            items.forEach((item) => {
                const option = document.createElement("option");
                option.value = item.id;
                option.textContent = item.label || item.id;
                profileSelect.appendChild(option);
            });
        }

        function fillVoices(items) {
            voiceSelect.innerHTML = "";
            items.forEach((item) => {
                const option = document.createElement("option");
                option.value = item.name;
                option.textContent = `${item.name}${item.gender ? ` (${item.gender})` : ""}`;
                voiceSelect.appendChild(option);
            });
        }

        function applyProfile(id) {
            const profile = profiles.find((item) => item.id === id);
            if (!profile) {
                return;
            }
            voiceSelect.value = profile.voice;
            document.getElementById("speed").value = profile.speed;
            document.getElementById("pitch").value = profile.pitch;
            document.getElementById("volume").value = profile.volume || "+0%";
        }

        async function fetchJson(path, fallback) {
            try {
                const response = await fetch(`${apiBase}${path}`, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                return fallback;
            }
        }

        async function checkApi() {
            try {
                const response = await fetch(`${apiBase}/health`, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                await response.json();
                statusBox.className = "status ok";
                statusBox.textContent = "System ready.";
                return true;
            } catch (error) {
                statusBox.className = "status bad";
                statusBox.textContent = "System offline. Run start.bat and wait a few seconds.";
                return false;
            }
        }

        async function bootstrap() {
            await checkApi();
            profiles = await fetchJson("/edge-tts/profiles", fallbackProfiles);
            const voices = await fetchJson("/edge-tts/voices", fallbackVoices);
            fillProfiles(profiles);
            fillVoices(voices);
            applyProfile(profileSelect.value || "default");
        }

        profileSelect.addEventListener("change", () => applyProfile(profileSelect.value));

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const text = textField.value.trim();
            if (!text) {
                statusBox.className = "status bad";
                statusBox.textContent = "Enter some text before generating audio.";
                return;
            }

            generateBtn.disabled = true;
            generateBtn.textContent = "Generating...";
            statusBox.className = "status warn";
            statusBox.textContent = "Generating audio...";

            const formData = new FormData();
            formData.set("text", text);
            formData.set("profile", profileSelect.value);
            formData.set("voice", voiceSelect.value);
            formData.set("speed", document.getElementById("speed").value);
            formData.set("pitch", document.getElementById("pitch").value);
            formData.set("volume", document.getElementById("volume").value);
            formData.set("output_format", document.getElementById("output_format").value);

            try {
                const response = await fetch(`${apiBase}/edge-tts`, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || `HTTP ${response.status}`);
                }

                const blob = await response.blob();
                if (currentAudioUrl) {
                    URL.revokeObjectURL(currentAudioUrl);
                }
                currentAudioUrl = URL.createObjectURL(blob);
                audioPlayer.src = currentAudioUrl;
                audioPlayer.play().catch(() => {});

                const outputFile = response.headers.get("X-Output-File") || `audio.${formData.get("output_format")}`;
                const voice = response.headers.get("X-Voice") || voiceSelect.value;
                const profile = response.headers.get("X-Profile") || profileSelect.value;
                const format = response.headers.get("X-Output-Format") || formData.get("output_format");

                downloadBtn.href = currentAudioUrl;
                downloadBtn.download = outputFile;
                resultMeta.innerHTML = `File: <code>${outputFile}</code><br>Profile: <code>${profile}</code> | Voice: <code>${voice}</code> | Format: <code>${format}</code>`;
                playerPanel.classList.add("active");

                statusBox.className = "status ok";
                statusBox.textContent = "Audio generated successfully.";
            } catch (error) {
                statusBox.className = "status bad";
                statusBox.textContent = `Failed to generate audio: ${error.message}`;
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = "Generate Audio";
            }
        });

        bootstrap();
        setInterval(checkApi, 10000);
    </script>
</body>
</html>
